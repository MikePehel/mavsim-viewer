<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ground Texture Mockups</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a1a; color: #ccc; font-family: 'Inter', system-ui, sans-serif; padding: 20px; }
h1 { text-align: center; margin-bottom: 10px; color: #fff; font-size: 24px; }
p.subtitle { text-align: center; margin-bottom: 30px; color: #888; font-size: 14px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1400px; margin: 0 auto; }
.card { background: #222; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
.card:hover { border-color: #0af; }
.card canvas { width: 100%; aspect-ratio: 1; display: block; cursor: crosshair; }
.card .info { padding: 14px; }
.card h3 { color: #fff; font-size: 15px; margin-bottom: 6px; }
.card .method { color: #0af; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.card p { font-size: 12px; line-height: 1.5; color: #999; }
.card .cost { margin-top: 8px; font-size: 11px; color: #666; }
.card .cost span { color: #6c6; }
.controls { text-align: center; margin: 20px 0; }
.controls label { color: #888; font-size: 13px; margin-right: 15px; }
.controls input[type=range] { vertical-align: middle; }
.controls span.val { color: #fff; font-size: 13px; min-width: 30px; display: inline-block; }
</style>
</head>
<body>
<h1>Ground Texture Candidates</h1>
<p class="subtitle">Each tile is 10m &times; 10m at grid spacing. Base color: rgb(32,32,34) matching Grid mode ground. Scroll to zoom.</p>

<div class="controls">
  <label>Tile Repeat: <input type="range" id="tileRepeat" min="1" max="8" value="3" step="1"><span class="val" id="tileVal">3</span></label>
  <label>Brightness: <input type="range" id="brightness" min="0.5" max="1.5" value="1.0" step="0.1"><span class="val" id="briVal">1.0</span></label>
</div>

<div class="grid" id="grid"></div>

<script>
// ── Noise primitives ──────────────────────────────────────────────────────
function hash(x, y) {
    let h = (x * 12979 + y * 87811 + 52967) | 0;
    h = Math.imul(h ^ (h >>> 13), 0x5bd1e995);
    h ^= h >>> 15;
    return ((h & 0xFFFF) / 65535.0);
}

function hash2(x, y) {
    let h1 = (x * 12979 + y * 87811 + 52967) | 0;
    h1 = Math.imul(h1 ^ (h1 >>> 13), 0x5bd1e995); h1 ^= h1 >>> 15;
    let h2 = (x * 73939 + y * 14197 + 81239) | 0;
    h2 = Math.imul(h2 ^ (h2 >>> 13), 0x5bd1e995); h2 ^= h2 >>> 15;
    return [(h1 & 0xFFFF) / 65535.0, (h2 & 0xFFFF) / 65535.0];
}

function smoothstep(t) { return t * t * (3 - 2 * t); }

function vnoise(x, y) {
    const ix = Math.floor(x), iy = Math.floor(y);
    let fx = x - ix, fy = y - iy;
    fx = smoothstep(fx); fy = smoothstep(fy);
    const a = hash(ix, iy), b = hash(ix+1, iy);
    const c = hash(ix, iy+1), d = hash(ix+1, iy+1);
    return a + (b-a)*fx + (c-a)*fy + (a-b-c+d)*fx*fy;
}

function fbm2(x, y) {
    return vnoise(x, y) * 0.5 + vnoise(x*2+5.3, y*2+1.7) * 0.3 + vnoise(x*4+9.1, y*4+3.2) * 0.2;
}

function fbm3(x, y) {
    return vnoise(x, y) * 0.45 + vnoise(x*2+5.3, y*2+1.7) * 0.28 +
           vnoise(x*4+9.1, y*4+3.2) * 0.17 + vnoise(x*8+2.5, y*8+6.1) * 0.10;
}

function voronoi(x, y) {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix, fy = y - iy;
    let f1 = 99, f2 = 99;
    for (let j = -1; j <= 1; j++) {
        for (let i = -1; i <= 1; i++) {
            const [ox, oy] = hash2(ix+i, iy+j);
            const dx = i + ox - fx, dy = j + oy - fy;
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d < f1) { f2 = f1; f1 = d; } else if (d < f2) { f2 = d; }
        }
    }
    return { f1, f2, crack: f2 - f1, edge: f2 };
}

function domainWarp(x, y, str) {
    const qx = fbm2(x, y);
    const qy = fbm2(x + 5.2, y + 1.3);
    return fbm2(x + qx * str, y + qy * str);
}

function domainWarpDouble(x, y, str) {
    const qx = fbm2(x, y);
    const qy = fbm2(x + 5.2, y + 1.3);
    const rx = fbm2(x + str*qx + 1.7, y + str*qy + 9.2);
    const ry = fbm2(x + str*qx + 8.3, y + str*qy + 2.8);
    return { val: fbm2(x + str*rx, y + str*ry), qx, qy, rx, ry };
}

function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function lerp(a, b, t) { return a + (b - a) * t; }

// ── Texture generators ────────────────────────────────────────────────────
const SIZE = 400;
const BASE_R = 32, BASE_G = 32, BASE_B = 34;

const textures = [
    {
        name: "Tarmac",
        method: "Domain-warped FBM + fine grit",
        desc: "Smooth asphalt surface with broad organic color patches from domain warping and high-frequency grit overlay. No hard edges.",
        cost: "CPU: ~80ms | VRAM: 16MB | Shader: 1 tex fetch",
        fn(x, y) {
            const s = 6.0;
            const warped = domainWarp(x*s, y*s, 1.5);
            const grit = vnoise(x*48, y*48) * 0.3 + vnoise(x*96, y*96) * 0.15;
            const v = warped * 0.7 + grit;
            const b = BASE_R + (v - 0.5) * 18;
            const hue = fbm2(x*3 + 11.3, y*3 + 7.9);
            const warm = (hue - 0.5) * 0.06;
            return [clamp(b * (1 + warm), 0, 255), clamp(b * 0.99, 0, 255), clamp(b * (1 - warm), 0, 255)];
        }
    },
    {
        name: "Cracked Earth",
        method: "Voronoi F2-F1 cracks + FBM fill",
        desc: "Dried earth with visible crack network. Voronoi cell boundaries create connected fracture lines, FBM fills cells with soil-like variation.",
        cost: "CPU: ~150ms | VRAM: 16MB | Shader: 1 tex fetch",
        fn(x, y) {
            const vs = 8.0;
            const { f1, crack } = voronoi(x*vs, y*vs);
            const crackLine = Math.pow(1 - clamp(crack * 5, 0, 1), 3);
            const fill = fbm3(x*12, y*12);
            const cellVar = f1 * 0.5;
            let b = BASE_R + (fill - 0.4) * 14 + cellVar * 8;
            b -= crackLine * 14;
            const warm = fbm2(x*3, y*3);
            return [clamp(b + warm * 3, 0, 255), clamp(b, 0, 255), clamp(b - warm * 2, 0, 255)];
        }
    },
    {
        name: "Concrete",
        method: "FBM + speckle noise + subtle stains",
        desc: "Poured concrete look with fine aggregate speckle, broad moisture stains from low-freq warped noise, and very subtle surface imperfections.",
        cost: "CPU: ~60ms | VRAM: 16MB | Shader: 1 tex fetch",
        fn(x, y) {
            const broad = domainWarp(x*4, y*4, 0.8);
            const speckle = hash(Math.floor(x*200), Math.floor(y*200));
            const fine = vnoise(x*30, y*30);
            let b = BASE_R + (broad - 0.5) * 10 + (fine - 0.5) * 6 + (speckle - 0.5) * 4;
            const stain = fbm2(x*2.5 + 3.1, y*2.5 + 8.7);
            b -= Math.pow(clamp(stain - 0.4, 0, 1), 2) * 8;
            return [clamp(b + 1, 0, 255), clamp(b, 0, 255), clamp(b + 2, 0, 255)];
        }
    },
    {
        name: "Packed Dirt",
        method: "Double domain warp + Voronoi pebbles",
        desc: "Organic packed earth with meandering color bands from double domain warping. Scattered pebble-like highlights from Voronoi F1 distance.",
        cost: "CPU: ~200ms | VRAM: 16MB | Shader: 1 tex fetch",
        fn(x, y) {
            const { val, qx, qy } = domainWarpDouble(x*5, y*5, 2.0);
            const { f1 } = voronoi(x*18, y*18);
            const pebble = Math.pow(clamp(1 - f1 * 2.5, 0, 1), 4) * 0.4;
            let b = BASE_R + (val - 0.5) * 16 + pebble * 12;
            const grit = vnoise(x*60, y*60);
            b += (grit - 0.5) * 3;
            const warm = (qx - 0.5) * 0.08;
            return [clamp(b * (1 + warm) + 2, 0, 255), clamp(b + 1, 0, 255), clamp(b * (1 - warm), 0, 255)];
        }
    },
    {
        name: "Gravel",
        method: "Voronoi cells + per-cell shade + FBM roughness",
        desc: "Loose gravel surface. Each Voronoi cell represents a stone with its own brightness. FBM adds surface roughness within cells. Cracks are dark gaps.",
        cost: "CPU: ~180ms | VRAM: 16MB | Shader: 1 tex fetch",
        fn(x, y) {
            const vs = 16.0;
            const ix = Math.floor(x*vs), iy = Math.floor(y*vs);
            const fx = x*vs - ix, fy = y*vs - iy;
            let f1 = 99, f1cell_x = 0, f1cell_y = 0, f2 = 99;
            for (let j = -1; j <= 1; j++) {
                for (let i = -1; i <= 1; i++) {
                    const [ox, oy] = hash2(ix+i, iy+j);
                    const dx = i + ox - fx, dy = j + oy - fy;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < f1) { f2 = f1; f1 = d; f1cell_x = ix+i; f1cell_y = iy+j; }
                    else if (d < f2) { f2 = d; }
                }
            }
            const cellShade = hash(f1cell_x * 7 + 31, f1cell_y * 13 + 47);
            const crack = Math.pow(1 - clamp((f2 - f1) * 8, 0, 1), 4);
            const rough = vnoise(x*50, y*50);
            let b = BASE_R + (cellShade - 0.5) * 16 + (rough - 0.5) * 5;
            b -= crack * 16;
            b += f1 * 3;
            return [clamp(b + cellShade * 2, 0, 255), clamp(b, 0, 255), clamp(b + 1, 0, 255)];
        }
    },
    {
        name: "Lunar Regolith",
        method: "Ridged FBM + crater Voronoi + dust",
        desc: "Moon-surface feel: ridged multifractal for rough terrain, Voronoi cells as shallow craters, fine dust overlay. Monochromatic, stark.",
        cost: "CPU: ~120ms | VRAM: 16MB | Shader: 1 tex fetch",
        fn(x, y) {
            // Ridged noise
            const s = 8.0;
            let ridged = Math.abs(vnoise(x*s, y*s) * 2 - 1);
            ridged += Math.abs(vnoise(x*s*2+3.1, y*s*2+7.4) * 2 - 1) * 0.5;
            ridged += Math.abs(vnoise(x*s*4+1.5, y*s*4+5.8) * 2 - 1) * 0.25;
            ridged = 1 - ridged / 1.75;
            // Craters
            const { f1 } = voronoi(x*6, y*6);
            const crater = clamp(f1 * 2.5 - 0.3, 0, 1);
            const dust = vnoise(x*80, y*80);
            let b = BASE_R + (ridged - 0.5) * 14 + (crater - 0.5) * 8 + (dust - 0.5) * 3;
            return [clamp(b, 0, 255), clamp(b, 0, 255), clamp(b + 1, 0, 255)];
        }
    },
    {
        name: "Weathered Asphalt",
        method: "Multi-scale FBM + Voronoi patches + wear stains",
        desc: "Old asphalt with aggregate showing through. Large wear patches from warped noise expose lighter sub-surface. Fine aggregate texture throughout.",
        cost: "CPU: ~160ms | VRAM: 16MB | Shader: 1 tex fetch",
        fn(x, y) {
            const base = fbm3(x*10, y*10);
            const wear = domainWarp(x*3, y*3, 1.2);
            const wearMask = Math.pow(clamp(wear - 0.35, 0, 1) * 2.5, 1.5);
            const { f1, crack } = voronoi(x*20, y*20);
            const aggregate = hash(Math.floor(x*120), Math.floor(y*120));
            let dark = BASE_R + (base - 0.5) * 10 + (aggregate - 0.5) * 3;
            let light = dark + 8 + f1 * 6;
            let b = lerp(dark, light, wearMask);
            const crackLine = Math.pow(1 - clamp(crack * 7, 0, 1), 3);
            b -= crackLine * 6 * (1 - wearMask);
            const warm = fbm2(x*2 + 5, y*2 + 9);
            return [clamp(b + warm * 3, 0, 255), clamp(b, 0, 255), clamp(b - warm * 1.5 + 1, 0, 255)];
        }
    },
    {
        name: "Desert Sand",
        method: "Windswept ridged noise + domain warp + ripples",
        desc: "Wind-blown sand with directional ripple patterns from anisotropic noise. Broad dune color variation from domain warping. Warm palette.",
        cost: "CPU: ~100ms | VRAM: 16MB | Shader: 1 tex fetch",
        fn(x, y) {
            // Directional ripples (stretched in one axis)
            const ripple = vnoise(x*5 + vnoise(x*2, y*2)*0.5, y*25);
            const broad = domainWarp(x*4, y*4, 1.8);
            const fine = vnoise(x*40, y*40);
            let b = BASE_R + (broad - 0.5) * 12 + (ripple - 0.5) * 8 + (fine - 0.5) * 3;
            // Warm sand tones
            return [clamp(b + 4, 0, 255), clamp(b + 1, 0, 255), clamp(b - 2, 0, 255)];
        }
    },
    {
        name: "Industrial Floor",
        method: "Grid-aligned Voronoi + wear gradient + speckle",
        desc: "Warehouse/hangar floor with faint tile-like structure from regularized Voronoi. Center-to-edge wear gradient. Paint speckle details.",
        cost: "CPU: ~140ms | VRAM: 16MB | Shader: 1 tex fetch",
        fn(x, y) {
            // Semi-regular grid with slight jitter
            const gs = 6.0;
            const gix = Math.floor(x*gs), giy = Math.floor(y*gs);
            const gfx = x*gs - gix, gfy = y*gs - giy;
            const [jx, jy] = hash2(gix, giy);
            const cx = 0.5 + (jx - 0.5) * 0.3, cy = 0.5 + (jy - 0.5) * 0.3;
            const dx = gfx - cx, dy = gfy - cy;
            const distToCenter = Math.sqrt(dx*dx + dy*dy);
            // Tile edge darkening
            const edgeDist = Math.min(gfx, 1-gfx, gfy, 1-gfy);
            const edge = Math.pow(1 - clamp(edgeDist * 8, 0, 1), 2);
            const tileShade = hash(gix * 3 + 17, giy * 5 + 31);
            const wear = fbm2(x*6, y*6);
            const speckle = hash(Math.floor(x*150), Math.floor(y*150));
            let b = BASE_R + (tileShade - 0.5) * 6 + (wear - 0.5) * 5 + (speckle - 0.5) * 2.5;
            b -= edge * 5;
            return [clamp(b + 1, 0, 255), clamp(b + 1, 0, 255), clamp(b + 2, 0, 255)];
        }
    }
];

// ── Rendering ─────────────────────────────────────────────────────────────
function renderAll() {
    const repeat = parseInt(document.getElementById('tileRepeat').value);
    const bri = parseFloat(document.getElementById('brightness').value);
    document.getElementById('tileVal').textContent = repeat;
    document.getElementById('briVal').textContent = bri.toFixed(1);

    const gridEl = document.getElementById('grid');
    gridEl.innerHTML = '';

    textures.forEach((tex, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        const canvas = document.createElement('canvas');
        canvas.width = SIZE; canvas.height = SIZE;
        const info = document.createElement('div');
        info.className = 'info';
        info.innerHTML = `<h3>${tex.name}</h3><div class="method">${tex.method}</div><p>${tex.desc}</p><div class="cost"><span>${tex.cost}</span></div>`;
        card.appendChild(canvas);
        card.appendChild(info);
        gridEl.appendChild(card);

        // Render async to not block UI
        setTimeout(() => {
            const ctx = canvas.getContext('2d');
            const imgData = ctx.createImageData(SIZE, SIZE);
            const d = imgData.data;

            for (let py = 0; py < SIZE; py++) {
                for (let px = 0; px < SIZE; px++) {
                    // Map pixel to tiled UV space
                    const u = (px / SIZE) * repeat;
                    const v = (py / SIZE) * repeat;

                    const [r, g, b] = tex.fn(u, v);
                    const i = (py * SIZE + px) * 4;
                    d[i]   = clamp(Math.round(r * bri), 0, 255);
                    d[i+1] = clamp(Math.round(g * bri), 0, 255);
                    d[i+2] = clamp(Math.round(b * bri), 0, 255);
                    d[i+3] = 255;
                }
            }
            ctx.putImageData(imgData, 0, 0);

            // Draw grid overlay to show tile boundaries
            if (repeat > 1) {
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = 1;
                for (let i = 1; i < repeat; i++) {
                    const p = (i / repeat) * SIZE;
                    ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, SIZE); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(SIZE, p); ctx.stroke();
                }
            }
        }, idx * 10);
    });
}

document.getElementById('tileRepeat').addEventListener('input', renderAll);
document.getElementById('brightness').addEventListener('input', renderAll);
renderAll();
</script>
</body>
</html>
