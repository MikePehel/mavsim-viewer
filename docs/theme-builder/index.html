<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAVSim Theme Builder</title>
<style>
@font-face {
  font-family: 'Inter';
  src: url('../../fonts/Inter-Medium.ttf') format('truetype');
  font-weight: 500;
}
@font-face {
  font-family: 'JetBrains Mono';
  src: url('../../fonts/JetBrainsMono-Medium.ttf') format('truetype');
  font-weight: 500;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0e14;
  --card: #080810;
  --border: rgba(0,180,204,0.39);
  --accent: #00b4cc;
  --accent-dim: rgba(0,180,204,0.55);
  --text: #c8d2e1;
  --text-dim: rgba(120,180,255,0.39);
  --text-muted: rgba(0,180,204,0.55);
}
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
code, .mono { font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace; }

/* -- Top Bar -- */
#topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  flex-wrap: wrap;
}
#topbar h1 {
  font-size: 1.1rem; font-weight: 700; color: var(--accent);
  margin-right: auto; letter-spacing: 0.5px;
}
#topbar input[type="text"] {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 6px 10px; border-radius: 4px; font-size: 0.85rem; width: 180px;
}
#topbar input[type="text"]:focus { border-color: var(--accent); outline: none; }
.btn {
  background: transparent; color: var(--accent); border: 1px solid var(--accent);
  padding: 6px 14px; border-radius: 4px; cursor: pointer;
  font-size: 0.8rem; font-weight: 600; letter-spacing: 0.3px;
  transition: background 0.15s, color 0.15s;
}
.btn:hover { background: var(--accent); color: #000; }
select {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 6px 10px; border-radius: 4px; font-size: 0.85rem;
}
select:focus { border-color: var(--accent); outline: none; }

/* -- Layout -- */
#main {
  display: flex;
  min-height: calc(100vh - 48px);
}
#sidebar {
  width: 380px;
  min-width: 380px;
  overflow-y: auto;
  border-right: 1px solid var(--border);
  padding: 0;
  height: calc(100vh - 48px);
  position: sticky;
  top: 48px;
}
#previews {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  height: calc(100vh - 48px);
}

/* -- Sections -- */
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 6px;
}
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  cursor: pointer;
  user-select: none;
  font-weight: 600;
  font-size: 0.85rem;
  color: var(--accent);
  border-bottom: 1px solid transparent;
}
.section-header:hover { background: rgba(255,255,255,0.03); }
.section-header .count {
  font-size: 0.7rem; color: var(--text-muted); font-weight: 400;
}
.section-header .arrow {
  transition: transform 0.15s;
  font-size: 0.7rem;
  color: var(--text-muted);
}
.section.collapsed .section-body { display: none; }
.section.collapsed .arrow { transform: rotate(-90deg); }
.section:not(.collapsed) .section-header { border-bottom-color: var(--border); }
.section-body { padding: 8px 12px; }

/* -- Color Row -- */
.color-row {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 0 3px 8px;
}
.color-row label {
  font-size: 0.75rem; color: var(--text-dim);
  width: 100px; min-width: 100px;
  text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
}
.color-row input[type="color"] {
  width: 28px; height: 24px; border: 1px solid var(--border);
  border-radius: 3px; cursor: pointer; background: none; padding: 0;
}
.color-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 1px; }
.color-row input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }
.alpha-slider {
  width: 50px; height: 4px; accent-color: var(--accent);
}
.rgba-input {
  font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace;
  font-size: 0.7rem;
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 3px 5px; border-radius: 3px; width: 105px;
}
.rgba-input:focus { border-color: var(--accent); outline: none; }

/* -- Preview Cards -- */
.preview-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.preview-card h3 {
  padding: 8px 14px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--accent);
  border-bottom: 1px solid var(--border);
}
.preview-card canvas {
  display: block;
  margin: 0 auto;
  max-width: 100%;
}

/* -- Preview Grid with named areas -- */
.preview-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  max-width: 900px;
  margin: 0 auto;
}
.preview-grid .pc-scene    { grid-column: 1 / -1; }
.preview-grid .pc-hud      { grid-column: 1 / -1; }
.preview-grid .pc-trail    { grid-column: 1 / -1; }
.preview-grid .pc-ribbon   { grid-column: 1 / -1; }
.preview-grid .pc-arms     { grid-column: 1 / -1; }
.preview-grid .pc-palette  { grid-column: 1 / -1; }
.preview-grid .pc-prompt   { grid-column: 1 / 2; }
.preview-grid .pc-debug    { grid-column: 2 / 3; }
.preview-grid .pc-ground   { grid-column: 1 / 2; }
.preview-grid .pc-ortho    { grid-column: 2 / 3; }

/* -- File input -- */
#loadFile {
  display: none;
}

@media (max-width: 1100px) {
  #main { flex-direction: column; }
  #sidebar {
    width: 100%; min-width: 100%;
    height: auto; position: static;
    border-right: none; border-bottom: 1px solid var(--border);
    max-height: none;
    overflow-y: visible;
    padding: 0;
  }
  #previews { height: auto; padding: 16px; }
  .section-header { padding: 8px 12px; }
  .section-body { padding: 8px 12px; }
  .preview-grid {
    grid-template-columns: 1fr;
    max-width: 100%;
    gap: 12px;
    margin: 0;
  }
  .preview-card { max-width: 100%; overflow: hidden; }
  .preview-card canvas { width: 100% !important; height: auto !important; }
  .preview-grid .pc-prompt,
  .preview-grid .pc-debug,
  .preview-grid .pc-ground,
  .preview-grid .pc-ortho { grid-column: 1 / -1; }
}
</style>
</head>
<body>

<div id="topbar">
  <h1>MAVSim Theme Builder</h1>
  <label style="font-size:0.8rem;color:var(--text-dim)">Name:</label>
  <input type="text" id="themeName" value="Custom">
  <label style="font-size:0.8rem;color:var(--text-dim)">Priority:</label>
  <input type="number" id="themePriority" value="90" style="width:50px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:2px 4px;font-size:0.8rem">
  <label style="font-size:0.8rem;color:var(--text-dim)">Load preset:</label>
  <select id="presetSelect">
    <option value="">-- select --</option>
    <option value="Grid">Grid</option>
    <option value="Rez">Rez</option>
    <option value="Snow">Snow</option>
    <option value="IRL">IRL</option>
    <option value="Pastel">Pastel</option>
    <option value="F34">F34</option>
    <option value="Design Modern">Design Modern</option>
    <option value="Rock Star">Rock Star</option>
    <option value="Winter Sports">Winter Sports</option>
    <option value="Covert Ops">Covert Ops</option>
    <option value="2501">2501</option>
  </select>
  <input type="file" id="loadFile" accept=".mvt">
  <button class="btn" onclick="document.getElementById('loadFile').click()">Load .mvt</button>
  <button class="btn" onclick="exportMvt()">Export .mvt</button>
</div>

<div id="main">
  <div id="sidebar"></div>
  <div id="previews">
    <div class="preview-grid">
      <div class="preview-card pc-scene"><h3>Scene</h3><canvas id="cvScene"></canvas></div>
      <div class="preview-card pc-hud"><h3>HUD</h3><canvas id="cvHud"></canvas></div>
      <div class="preview-card pc-trail"><h3>Trail</h3><canvas id="cvTrail"></canvas></div>
      <div class="preview-card pc-ribbon"><h3>Ribbon Gradient</h3><canvas id="cvRibbon"></canvas></div>
      <div class="preview-card pc-palette"><h3>Drone ID Palette</h3><canvas id="cvPalette"></canvas></div>
      <div class="preview-card pc-arms"><h3>Drone Arms</h3><canvas id="cvArms"></canvas></div>
      <div class="preview-card pc-prompt"><h3>Prompt</h3><canvas id="cvPrompt"></canvas></div>
      <div class="preview-card pc-debug"><h3>Debug Panel</h3><canvas id="cvDebug"></canvas></div>
      <div class="preview-card pc-ground"><h3>Ground Track</h3><canvas id="cvGround"></canvas></div>
      <div class="preview-card pc-ortho"><h3>Ortho Grid</h3><canvas id="cvOrtho"></canvas></div>
    </div>
  </div>
</div>

// -- Current colors state --
const colors = {};
const allSlots = [];
SECTIONS.forEach(s => s.slots.forEach(k => { allSlots.push(k); colors[k] = [128,128,128,255]; }));

function rgba(k) { const c = colors[k]; return `rgba(${c[0]},${c[1]},${c[2]},${(c[3]/255).toFixed(3)})`; }
function rgbaArr(c) { return `rgba(${c[0]},${c[1]},${c[2]},${(c[3]/255).toFixed(3)})`; }
function hex(r,g,b) { return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join(''); }
function parseHex(h) { return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }

// -- Build sidebar --
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';

  // Light/Dark mode toggle at top of sidebar
  const modeDiv = document.createElement('div');
  modeDiv.style.cssText = 'padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px';
  modeDiv.innerHTML = `<label style="font-size:0.85rem;color:var(--text)">Light Mode</label>
    <input type="checkbox" id="themeThickTrails" style="vertical-align:middle">
    <span style="font-size:0.7rem;color:var(--text-dim)">(affects trail thickness, future display options)</span>`;
  sb.appendChild(modeDiv);

  SECTIONS.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'section collapsed';
    div.innerHTML = `<div class="section-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <span>${sec.name} <span class="count">(${sec.count})</span></span>
      <span class="arrow">&#9660;</span>
    </div><div class="section-body"></div>`;
    const body = div.querySelector('.section-body');
    sec.slots.forEach(key => {
      const row = document.createElement('div');
      row.className = 'color-row';
      const c = colors[key];
      row.innerHTML = `
        <label title="${key}">${LABELS[key] || key}</label>
        <input type="color" id="cp_${key}" value="${hex(c[0],c[1],c[2])}">
        <input type="range" class="alpha-slider" id="al_${key}" min="0" max="255" value="${c[3]}" title="Alpha">
        <input type="text" class="rgba-input mono" id="tx_${key}" value="${c[0]} ${c[1]} ${c[2]} ${c[3]}">
      `;
      body.appendChild(row);
      // Events
      row.querySelector(`#cp_${key}`).addEventListener('input', e => {
        const rgb = parseHex(e.target.value);
        colors[key][0]=rgb[0]; colors[key][1]=rgb[1]; colors[key][2]=rgb[2];
        row.querySelector(`#tx_${key}`).value = colors[key].join(' ');
        scheduleRedraw();
      });
      row.querySelector(`#al_${key}`).addEventListener('input', e => {
        colors[key][3] = parseInt(e.target.value);
        row.querySelector(`#tx_${key}`).value = colors[key].join(' ');
        scheduleRedraw();
      });
      row.querySelector(`#tx_${key}`).addEventListener('change', e => {
        const parts = e.target.value.trim().split(/\s+/).map(Number);
        if (parts.length === 4 && parts.every(v => !isNaN(v) && v >= 0 && v <= 255)) {
          colors[key] = parts;
          row.querySelector(`#cp_${key}`).value = hex(parts[0],parts[1],parts[2]);
          row.querySelector(`#al_${key}`).value = parts[3];
          scheduleRedraw();
        }
      });
    });
    sb.appendChild(div);
  });
}

function syncUI() {
  allSlots.forEach(key => {
    const c = colors[key];
    const cp = document.getElementById('cp_'+key);
    const al = document.getElementById('al_'+key);
    const tx = document.getElementById('tx_'+key);
    if (cp) cp.value = hex(c[0],c[1],c[2]);
    if (al) al.value = c[3];
    if (tx) tx.value = c.join(' ');
  });
}

// -- Load preset --
function loadPreset(name) {
  const t = THEMES[name];
  if (!t) return;
  document.getElementById('themeName').value = name;
  document.getElementById('themeThickTrails').checked = !!t.thick_trails;
  allSlots.forEach(k => { if (t[k]) colors[k] = [...t[k]]; });
  syncUI();
  scheduleRedraw();
}

document.getElementById('presetSelect').addEventListener('change', e => {
  if (e.target.value) loadPreset(e.target.value);
});

  ribbon: ["thermal_0","thermal_1","thermal_2","thermal_3","thermal_4","thermal_5","thermal_6"],

    "drone_palette_8","drone_palette_9","drone_palette_10","drone_palette_11",
    "drone_palette_12","drone_palette_13","drone_palette_14","drone_palette_15"]
};

function mvtKeyToInternal(section, key) {
  if (section === 'scene') return key;
  if (section === 'hud') {
    if (key.startsWith('adi_')) return key;
    return 'hud_' + key;
  }
  if (section === 'trail') return 'trail_' + key;
  if (section === 'arms') return 'arm_' + key;
  if (section === 'ribbon') return 'thermal_' + key.replace('stop_','');
  if (section === 'debug') return 'dbg_' + key;
  if (section === 'prompt') return 'prompt_' + key;
  if (section === 'ground_track') return 'ground_track_' + key;
  if (section === 'ortho') return 'ortho_' + key.replace('grid_','grid_');
  if (section === 'drone_palette') return 'drone_palette_' + key.replace('color_','');
  return key;
}

function internalToMvtKey(key) {
  if (key.startsWith('hud_') && !key.startsWith('hud_a')) return key.slice(4);
  if (key.startsWith('hud_accent')) return key.slice(4);
  if (key.startsWith('hud_')) return key.slice(4);
  if (key.startsWith('trail_')) return key.slice(6);
  if (key.startsWith('arm_')) return key.slice(4);
  if (key.startsWith('thermal_')) return 'stop_' + key.slice(8);
  if (key.startsWith('dbg_')) return key.slice(4);
  if (key.startsWith('prompt_')) return key.slice(7);
  if (key.startsWith('ground_track_')) return key.slice(13);
  if (key.startsWith('ortho_')) return key.slice(6);
  if (key.startsWith('drone_palette_')) return 'color_' + key.slice(14);
  return key;
}

function exportMvt() {
  const name = document.getElementById('themeName').value || 'Custom';
  const priority = document.getElementById('themePriority').value || '0';
  const thickTrails = document.getElementById('themeThickTrails').checked ? '1' : '0';
  let out = '[theme]\nname: ' + name + '\npriority: ' + priority + '\nthick_trails: ' + thickTrails + '\n';
  const secOrder = ['scene','hud','trail','arms','ribbon','debug','prompt','ground_track','ortho','drone_palette'];
  secOrder.forEach(sec => {
    out += '\n[' + sec + ']\n';
    MVT_SECTIONS[sec].forEach(key => {
      const c = colors[key];
      out += internalToMvtKey(key) + ': ' + c.join(' ') + '\n';
    });
  });
  const blob = new Blob([out], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name.toLowerCase().replace(/\s+/g,'_') + '.mvt';
  a.click();
  URL.revokeObjectURL(a.href);
}

document.getElementById('loadFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const text = ev.target.result;
    let currentSection = null;
    text.split('\n').forEach(line => {
      line = line.trim();
      if (!line || line.startsWith('#')) return;
      const secMatch = line.match(/^\[(\w+)\]$/);
      if (secMatch) { currentSection = secMatch[1]; return; }
      const kvMatch = line.match(/^([\w_]+)\s*:\s*(.+)$/);
      if (!kvMatch) return;
      const [, rawKey, rawVal] = kvMatch;
      if (currentSection === 'theme' && rawKey === 'name') {
        document.getElementById('themeName').value = rawVal.trim();
        return;
      }
      if (currentSection === 'theme' && rawKey === 'priority') {
        document.getElementById('themePriority').value = rawVal.trim();
        return;
      }
      if (currentSection === 'theme' && rawKey === 'thick_trails') {
        document.getElementById('themeThickTrails').checked = (rawVal.trim() === '1' || rawVal.trim() === 'true');
        return;
      }
      if (!currentSection) return;
      const intKey = mvtKeyToInternal(currentSection, rawKey);
      const parts = rawVal.trim().split(/\s+/).map(Number);
      if (parts.length === 4 && parts.every(v => !isNaN(v) && v >= 0 && v <= 255)) {
        if (colors.hasOwnProperty(intKey)) {
          colors[intKey] = parts;
        }
      }
    });
    syncUI();
    scheduleRedraw();
  };
  reader.readAsText(file);
  e.target.value = '';
});

// -- Drawing helpers --
let redrawTimer = null;
function scheduleRedraw() {
  if (redrawTimer) return;
  redrawTimer = requestAnimationFrame(() => { redrawTimer = null; drawAll(); });
}

// DPI-aware canvas setup
const CANVAS_SIZES = {
  cvScene:   [560, 320],
  cvHud:     [560, 200],
  cvTrail:   [560, 130],
  cvRibbon:  [560, 44],
  cvArms:    [560, 460],
  cvPalette: [560, 80],
  cvPrompt:  [340, 200],
  cvDebug:   [340, 220],
  cvGround:  [340, 200],
  cvOrtho:   [340, 200]
};

function setupCanvas(canvas, width, height) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return ctx;
}

function getCtx(id) {
  const canvas = document.getElementById(id);
  const [w, h] = CANVAS_SIZES[id];
  return setupCanvas(canvas, w, h);
}

function lerpColor(a, b, t) {
  return [
    Math.round(a[0]+(b[0]-a[0])*t),
    Math.round(a[1]+(b[1]-a[1])*t),
    Math.round(a[2]+(b[2]-a[2])*t),
    Math.round(a[3]+(b[3]-a[3])*t)
  ];
}

// -- Scene Preview --
function drawScene() {
  const ctx = getCtx('cvScene');
  const W = CANVAS_SIZES.cvScene[0], H = CANVAS_SIZES.cvScene[1];
  const horizon = H * 0.45;

  ctx.fillStyle = rgba('sky');
  ctx.fillRect(0, 0, W, horizon);

  ctx.fillStyle = rgba('ground');
  ctx.fillRect(0, horizon, W, H - horizon);

  const cx = W / 2;
  ctx.strokeStyle = rgba('grid_minor');
  ctx.lineWidth = 0.5;
  for (let i = 1; i <= 20; i++) {
    const y = horizon + (H - horizon) * (1 - Math.pow(0.88, i));
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let i = -10; i <= 10; i++) {
    const bx = cx + i * 40;
    ctx.beginPath(); ctx.moveTo(cx, horizon); ctx.lineTo(bx, H); ctx.stroke();
  }
  ctx.strokeStyle = rgba('grid_major');
  ctx.lineWidth = 1.2;
  for (let i = 1; i <= 6; i++) {
    const y = horizon + (H - horizon) * (1 - Math.pow(0.7, i));
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let i = -3; i <= 3; i++) {
    const bx = cx + i * 120;
    ctx.beginPath(); ctx.moveTo(cx, horizon); ctx.lineTo(bx, H); ctx.stroke();
  }

  ctx.strokeStyle = rgba('axis_x');
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, horizon); ctx.lineTo(W, horizon); ctx.stroke();

  ctx.strokeStyle = rgba('axis_z');
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, horizon); ctx.lineTo(cx, H); ctx.stroke();

  // -- Drone silhouette (quadrotor, chase-camera perspective) --
  const droneX = cx;
  const droneY = horizon - 28;  // hovering above the ground plane
  const armLen = 16;
  const motorR = 5;

  // Ground track shadow on the ground plane (ellipse below drone)
  const shadowY = horizon + 18;
  ctx.fillStyle = rgba('ground_track_fill');
  ctx.beginPath();
  ctx.ellipse(droneX, shadowY, 14, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Arms - front pair (angled forward-up in perspective)
  ctx.strokeStyle = rgba('arm_front');
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(droneX, droneY); ctx.lineTo(droneX - armLen, droneY - armLen * 0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(droneX, droneY); ctx.lineTo(droneX + armLen, droneY - armLen * 0.5); ctx.stroke();

  // Arms - back pair (angled backward-down in perspective)
  ctx.strokeStyle = rgba('arm_back');
  ctx.beginPath(); ctx.moveTo(droneX, droneY); ctx.lineTo(droneX - armLen, droneY + armLen * 0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(droneX, droneY); ctx.lineTo(droneX + armLen, droneY + armLen * 0.5); ctx.stroke();

  // Motor circles at arm ends
  ctx.fillStyle = rgba('arm_front');
  ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.arc(droneX - armLen, droneY - armLen * 0.5, motorR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(droneX + armLen, droneY - armLen * 0.5, motorR, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = rgba('arm_back');
  ctx.beginPath(); ctx.arc(droneX - armLen, droneY + armLen * 0.5, motorR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(droneX + armLen, droneY + armLen * 0.5, motorR, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1.0;

  // Center body (dark)
  ctx.fillStyle = 'rgba(20,20,30,0.9)';
  ctx.beginPath(); ctx.arc(droneX, droneY, 4, 0, Math.PI * 2); ctx.fill();

  // Front direction indicator
  ctx.fillStyle = rgba('arm_front');
  ctx.beginPath();
  ctx.moveTo(droneX, droneY - 6);
  ctx.lineTo(droneX - 2, droneY - 3);
  ctx.lineTo(droneX + 2, droneY - 3);
  ctx.closePath();
  ctx.fill();

  const fog = colors['fog'];
  const grad = ctx.createRadialGradient(cx, horizon, W*0.2, cx, horizon, W*0.7);
  grad.addColorStop(0, 'rgba('+fog[0]+','+fog[1]+','+fog[2]+',0)');
  grad.addColorStop(1, 'rgba('+fog[0]+','+fog[1]+','+fog[2]+','+(fog[3]/255*0.5).toFixed(3)+')');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// -- HUD Preview --
function drawHud() {
  const ctx = getCtx('cvHud');
  const W = CANVAS_SIZES.cvHud[0], H = CANVAS_SIZES.cvHud[1];
  ctx.clearRect(0, 0, W, H);

  // Draw scene background (sky above, ground below) so HUD feels overlaid on viewport
  const sceneHorizon = H * 0.4;
  ctx.fillStyle = rgba('sky');
  ctx.fillRect(0, 0, W, sceneHorizon);
  ctx.fillStyle = rgba('ground');
  ctx.fillRect(0, sceneHorizon, W, H - sceneHorizon);
  // Subtle grid lines on ground for depth
  ctx.strokeStyle = rgba('grid_minor');
  ctx.lineWidth = 0.4;
  const sceneCx = W / 2;
  for (let i = 1; i <= 8; i++) {
    const y = sceneHorizon + (H - sceneHorizon) * (1 - Math.pow(0.82, i));
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let i = -6; i <= 6; i++) {
    const bx = sceneCx + i * 50;
    ctx.beginPath(); ctx.moveTo(sceneCx, sceneHorizon); ctx.lineTo(bx, H); ctx.stroke();
  }

  const barH = 100;
  const barY = H - barH;
  ctx.fillStyle = rgba('hud_bg');
  ctx.fillRect(0, barY, W, barH);
  ctx.strokeStyle = rgba('hud_border');
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, barY); ctx.lineTo(W, barY); ctx.stroke();

  ctx.font = 'bold 16px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillStyle = rgba('hud_accent');
  ctx.textBaseline = 'middle';
  ctx.fillText('HDG', 12, barY + 24);
  ctx.font = 'bold 22px SF Mono, Menlo, Consolas, monospace';
  ctx.fillText('270', 12, barY + 50);

  const compCX = 130, compCY = barY + barH/2, compR = 34;
  ctx.fillStyle = rgba('hud_bg');
  ctx.beginPath(); ctx.arc(compCX, compCY, compR, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = rgba('hud_border');
  ctx.lineWidth = 1.5;
  ctx.stroke();
  for (let i = 0; i < 36; i++) {
    const angle = (i * 10 - 90) * Math.PI / 180;
    const isMajor = i % 9 === 0;
    const r1 = compR - (isMajor ? 12 : 6);
    ctx.strokeStyle = isMajor ? rgba('hud_accent') : rgba('hud_accent_dim');
    ctx.lineWidth = isMajor ? 2 : 1;
    ctx.beginPath();
    ctx.moveTo(compCX + Math.cos(angle)*r1, compCY + Math.sin(angle)*r1);
    ctx.lineTo(compCX + Math.cos(angle)*compR, compCY + Math.sin(angle)*compR);
    ctx.stroke();
  }
  const nAngle = -Math.PI/2;
  ctx.strokeStyle = rgba('hud_warn');
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(compCX + Math.cos(nAngle)*(compR-14), compCY + Math.sin(nAngle)*(compR-14));
  ctx.lineTo(compCX + Math.cos(nAngle)*(compR+6), compCY + Math.sin(nAngle)*(compR+6));
  ctx.stroke();
  ctx.font = 'bold 11px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillStyle = rgba('hud_warn');
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('N', compCX, compCY - compR - 10);
  ctx.textAlign = 'left';

  const adiCX = 220, adiCY = barY + barH/2, adiR = 34;
  ctx.save();
  ctx.beginPath(); ctx.arc(adiCX, adiCY, adiR, 0, Math.PI*2); ctx.clip();
  ctx.fillStyle = rgba('adi_sky');
  ctx.fillRect(adiCX - adiR, adiCY - adiR, adiR*2, adiR);
  ctx.fillStyle = rgba('adi_ground');
  ctx.fillRect(adiCX - adiR, adiCY, adiR*2, adiR);
  ctx.strokeStyle = rgba('adi_horizon');
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(adiCX - adiR, adiCY); ctx.lineTo(adiCX + adiR, adiCY); ctx.stroke();
  ctx.restore();
  ctx.strokeStyle = rgba('hud_border');
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(adiCX, adiCY, adiR, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = rgba('adi_wing');
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(adiCX-20, adiCY); ctx.lineTo(adiCX-10, adiCY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(adiCX+10, adiCY); ctx.lineTo(adiCX+20, adiCY); ctx.stroke();
  ctx.fillStyle = rgba('adi_wing');
  ctx.beginPath(); ctx.arc(adiCX, adiCY, 2, 0, Math.PI*2); ctx.fill();

  const warnX = 290, warnY = barY + 14;
  ctx.fillStyle = rgba('hud_warn');
  ctx.beginPath();
  ctx.moveTo(warnX + 10, warnY);
  ctx.lineTo(warnX, warnY + 18);
  ctx.lineTo(warnX + 20, warnY + 18);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = rgba('hud_bg');
  ctx.font = 'bold 12px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('!', warnX + 10, warnY + 12);
  ctx.font = 'bold 14px SF Mono, Menlo, Consolas, monospace';
  ctx.fillStyle = rgba('hud_warn');
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('WARN', warnX + 26, warnY + 9);

  ctx.font = 'bold 13px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillStyle = rgba('hud_highlight');
  ctx.fillText('ALT 120m', 290, barY + 52);

  ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillStyle = rgba('hud_accent_dim');
  ctx.fillText('GS 12.4 m/s', 290, barY + 72);

  ctx.strokeStyle = rgba('hud_border');
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H-1); ctx.lineTo(W, H-1); ctx.stroke();
}

// -- Trail Preview: smooth bezier flight path --
function drawTrail() {
  const ctx = getCtx('cvTrail');
  const W = CANVAS_SIZES.cvTrail[0], H = CANVAS_SIZES.cvTrail[1];
  ctx.clearRect(0, 0, W, H);

  const pathTop = 12;
  const pathBot = 85;
  const legendY = 108;

  // Define a smooth S-curve flight path as connected bezier segments
  // Each segment: [startX, startY, cp1x, cp1y, cp2x, cp2y, endX, endY, colorKey]
  const segments = [
    // Forward: gentle cruise from left
    [20, 55, 50, 55, 70, 50, 100, 42, 'trail_forward'],
    // Climb: sweeping upward
    [100, 42, 120, 36, 140, 18, 175, 16, 'trail_climb'],
    // Forward: level flight at altitude
    [175, 16, 200, 15, 220, 18, 250, 22, 'trail_forward'],
    // Descend: sweeping downward
    [250, 22, 275, 28, 300, 58, 320, 68, 'trail_descend'],
    // Backward: reversing direction (looping back)
    [320, 68, 335, 73, 350, 72, 365, 64, 'trail_backward'],
    // Forward: resuming
    [365, 64, 385, 52, 410, 38, 440, 32, 'trail_forward'],
    // Roll positive: banking turn
    [440, 32, 455, 28, 470, 30, 490, 38, 'trail_roll_pos'],
    // Roll negative: opposite bank
    [490, 38, 505, 44, 515, 50, 530, 48, 'trail_roll_neg'],
  ];

  // Draw glow layer first (thicker, translucent)
  segments.forEach(([x0,y0,c1x,c1y,c2x,c2y,x1,y1,key]) => {
    const c = colors[key];
    ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${(c[3]/255*0.25).toFixed(3)})`;
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.bezierCurveTo(c1x, c1y, c2x, c2y, x1, y1);
    ctx.stroke();
  });

  // Draw main path
  segments.forEach(([x0,y0,c1x,c1y,c2x,c2y,x1,y1,key]) => {
    ctx.strokeStyle = rgba(key);
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.bezierCurveTo(c1x, c1y, c2x, c2y, x1, y1);
    ctx.stroke();
  });

  // Small drone icon at the end of the path
  const ex = 530, ey = 48;
  ctx.fillStyle = rgba('trail_forward');
  ctx.beginPath();
  ctx.moveTo(ex + 8, ey);
  ctx.lineTo(ex + 2, ey - 4);
  ctx.lineTo(ex + 2, ey + 4);
  ctx.closePath();
  ctx.fill();

  // Legend at bottom
  const items = [
    ['trail_forward','Forward'], ['trail_backward','Backward'],
    ['trail_climb','Climb'], ['trail_descend','Descend'],
    ['trail_roll_pos','Roll +'], ['trail_roll_neg','Roll -']
  ];
  ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.textBaseline = 'middle';
  let lx = 20;
  items.forEach(([key, label]) => {
    ctx.fillStyle = rgba(key);
    ctx.beginPath(); ctx.arc(lx, legendY, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#94a3b8';
    ctx.textAlign = 'left';
    ctx.fillText(label, lx + 8, legendY);
    lx += ctx.measureText(label).width + 26;
  });
}

// -- Ribbon Gradient Preview --
function drawRibbon() {
  const ctx = getCtx('cvRibbon');
  const W = CANVAS_SIZES.cvRibbon[0], H = CANVAS_SIZES.cvRibbon[1];
  ctx.clearRect(0, 0, W, H);

  const barY = 6, barH = 18;
  const margin = 40;
  const barW = W - margin*2;
  const radius = 9;

  // Draw gradient bar with rounded corners using clip
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(margin + radius, barY);
  ctx.lineTo(margin + barW - radius, barY);
  ctx.arcTo(margin + barW, barY, margin + barW, barY + radius, radius);
  ctx.lineTo(margin + barW, barY + barH - radius);
  ctx.arcTo(margin + barW, barY + barH, margin + barW - radius, barY + barH, radius);
  ctx.lineTo(margin + radius, barY + barH);
  ctx.arcTo(margin, barY + barH, margin, barY + barH - radius, radius);
  ctx.lineTo(margin, barY + radius);
  ctx.arcTo(margin, barY, margin + radius, barY, radius);
  ctx.closePath();
  ctx.clip();

  for (let x = 0; x < barW; x++) {
    const t = x / barW;
    const scaled = t * 6;
    let idx = Math.floor(scaled);
    if (idx >= 6) idx = 5;
    const frac = scaled - idx;
    const c = lerpColor(colors['thermal_'+idx], colors['thermal_'+(idx+1)], frac);
    ctx.fillStyle = rgbaArr(c);
    ctx.fillRect(margin + x, barY, 1, barH);
  }
  ctx.restore();

  // Labels
  ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillStyle = '#94a3b8';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillText('Slow', margin, barY + barH + 4);
  ctx.textAlign = 'right';
  ctx.fillText('Fast', margin + barW, barY + barH + 4);
  ctx.textAlign = 'left';
}

// -- Drone Arms Preview --
function drawArms() {
  const ctx = getCtx('cvArms');
  const W = CANVAS_SIZES.cvArms[0], H = CANVAS_SIZES.cvArms[1];
  ctx.clearRect(0, 0, W, H);

  // Row 1: Quad, Hex, VTOL (3 columns)
  const row1SectionW = W / 3;
  const row1Labels = ['Quadrotor', 'Hexarotor', 'VTOL Wing'];
  const row1ModernY = 70;
  const row1ClassicY = 180;
  const droneR = 38;

  // Row 2: ROV, Rover (2 columns, centered)
  const row2SectionW = W / 2;
  const row2Labels = ['ROV', 'Rover'];
  const row2BaseY = 230;
  const row2ModernY = row2BaseY + 60;
  const row2ClassicY = row2BaseY + 170;

  // -- Row 1 labels --
  ctx.font = 'bold 12px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#94a3b8';
  for (let i = 0; i < 3; i++) {
    ctx.fillText(row1Labels[i], row1SectionW * i + row1SectionW/2, 4);
  }
  ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillStyle = '#64748b';
  for (let i = 0; i < 3; i++) {
    ctx.fillText('Modern', row1SectionW * i + row1SectionW/2, row1ModernY - 16);
    ctx.fillText('Classic', row1SectionW * i + row1SectionW/2, row1ClassicY - 16);
  }

  // -- Row 2 labels --
  // Divider line between rows
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(20, row2BaseY); ctx.lineTo(W - 20, row2BaseY); ctx.stroke();

  ctx.font = 'bold 12px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillStyle = '#94a3b8';
  for (let i = 0; i < 2; i++) {
    ctx.fillText(row2Labels[i], row2SectionW * i + row2SectionW/2, row2BaseY + 8);
  }
  ctx.font = '10px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillStyle = '#64748b';
  for (let i = 0; i < 2; i++) {
    ctx.fillText('Modern', row2SectionW * i + row2SectionW/2, row2ModernY - 16);
    ctx.fillText('Classic', row2SectionW * i + row2SectionW/2, row2ClassicY - 16);
  }

  function drawMotor(cx, cy, color, r) {
    r = r || 8;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.3;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1.0;
  }

  function drawArmLine(x1, y1, x2, y2, color, width) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width || 3;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }

  function drawBody(cx, cy, w, h) {
    ctx.fillStyle = 'rgba(30,30,40,0.9)';
    ctx.fillRect(cx - w/2, cy - h/2, w, h);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
    ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
    ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
    ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
    ctx.closePath();
  }

  // -- Quadrotor --
  const qcx = row1SectionW * 0.5;

  function drawQuad(cy, front, back, port, starboard) {
    const a = droneR * 0.75;
    drawArmLine(qcx, cy, qcx - a * 0.7, cy - a * 0.7, rgba(front), 3);
    drawArmLine(qcx, cy, qcx + a * 0.7, cy - a * 0.7, rgba(front), 3);
    drawArmLine(qcx, cy, qcx - a * 0.7, cy + a * 0.7, rgba(back), 3);
    drawArmLine(qcx, cy, qcx + a * 0.7, cy + a * 0.7, rgba(back), 3);
    drawBody(qcx, cy, 12, 14);
    drawMotor(qcx - a*0.7, cy - a*0.7, rgba(front), 8);
    ctx.fillStyle = rgba(port);
    ctx.beginPath(); ctx.arc(qcx - a*0.7 - 4, cy - a*0.7, 3, 0, Math.PI*2); ctx.fill();
    drawMotor(qcx + a*0.7, cy - a*0.7, rgba(front), 8);
    ctx.fillStyle = rgba(starboard);
    ctx.beginPath(); ctx.arc(qcx + a*0.7 + 4, cy - a*0.7, 3, 0, Math.PI*2); ctx.fill();
    drawMotor(qcx - a*0.7, cy + a*0.7, rgba(back), 8);
    ctx.fillStyle = rgba(port);
    ctx.beginPath(); ctx.arc(qcx - a*0.7 - 4, cy + a*0.7, 3, 0, Math.PI*2); ctx.fill();
    drawMotor(qcx + a*0.7, cy + a*0.7, rgba(back), 8);
    ctx.fillStyle = rgba(starboard);
    ctx.beginPath(); ctx.arc(qcx + a*0.7 + 4, cy + a*0.7, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = rgba(front);
    ctx.beginPath(); ctx.moveTo(qcx, cy-8); ctx.lineTo(qcx-4, cy-2); ctx.lineTo(qcx+4, cy-2); ctx.fill();
  }

  drawQuad(row1ModernY, 'arm_front', 'arm_back', 'arm_port', 'arm_starboard');
  drawQuad(row1ClassicY, 'arm_classic_front', 'arm_classic_back', 'arm_classic_side', 'arm_classic_side');

  // -- Hexarotor --
  const hcx = row1SectionW * 1.5;

  function drawHex(cy, front, back, port, starboard) {
    const a = droneR * 0.8;
    const hexArms = [
      { deg: 330, colorKey: front },
      { deg: 30,  colorKey: front },
      { deg: 90,  colorKey: starboard },
      { deg: 150, colorKey: back },
      { deg: 210, colorKey: back },
      { deg: 270, colorKey: port }
    ];

    hexArms.forEach(h => {
      const rad = (h.deg - 90) * Math.PI / 180;
      const ex = hcx + Math.cos(rad) * a;
      const ey = cy + Math.sin(rad) * a;
      drawArmLine(hcx, cy, ex, ey, rgba(h.colorKey), 3);
      drawMotor(ex, ey, rgba(h.colorKey), 7);
    });

    drawBody(hcx, cy, 14, 16);
    ctx.fillStyle = rgba(front);
    ctx.beginPath(); ctx.moveTo(hcx, cy-8); ctx.lineTo(hcx-4, cy-2); ctx.lineTo(hcx+4, cy-2); ctx.fill();
  }

  drawHex(row1ModernY, 'arm_front', 'arm_back', 'arm_port', 'arm_starboard');
  drawHex(row1ClassicY, 'arm_classic_front', 'arm_classic_back', 'arm_classic_side', 'arm_classic_side');

  // -- VTOL Flying Wing (swept/delta shape, top-down view) --
  const vcx = row1SectionW * 2.5;

  function drawVTOL(cy, port, starboard) {
    const wingSpan = 48;
    const sweepBack = 20;
    const chordRoot = 18;
    const chordTip = 6;

    const noseFront = cy - chordRoot * 0.6;
    const noseBack = cy + chordRoot * 0.4;

    ctx.fillStyle = 'rgba(35,35,45,0.95)';
    ctx.beginPath();
    ctx.moveTo(vcx, noseFront);
    ctx.lineTo(vcx + wingSpan, cy - chordRoot*0.1 + sweepBack);
    ctx.lineTo(vcx + wingSpan, cy - chordRoot*0.1 + sweepBack + chordTip);
    ctx.lineTo(vcx, noseBack + 4);
    ctx.lineTo(vcx - wingSpan, cy - chordRoot*0.1 + sweepBack + chordTip);
    ctx.lineTo(vcx - wingSpan, cy - chordRoot*0.1 + sweepBack);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = rgba(port);
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(vcx - 10, noseFront + 3);
    ctx.lineTo(vcx - wingSpan, cy - chordRoot*0.1 + sweepBack);
    ctx.lineTo(vcx - wingSpan, cy - chordRoot*0.1 + sweepBack + chordTip);
    ctx.lineTo(vcx - 10, noseBack + 3);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1.0;

    ctx.fillStyle = rgba(starboard);
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(vcx + 10, noseFront + 3);
    ctx.lineTo(vcx + wingSpan, cy - chordRoot*0.1 + sweepBack);
    ctx.lineTo(vcx + wingSpan, cy - chordRoot*0.1 + sweepBack + chordTip);
    ctx.lineTo(vcx + 10, noseBack + 3);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1.0;

    ctx.strokeStyle = 'rgba(80,80,90,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(vcx, noseFront);
    ctx.lineTo(vcx + wingSpan, cy - chordRoot*0.1 + sweepBack);
    ctx.lineTo(vcx + wingSpan, cy - chordRoot*0.1 + sweepBack + chordTip);
    ctx.lineTo(vcx, noseBack + 4);
    ctx.lineTo(vcx - wingSpan, cy - chordRoot*0.1 + sweepBack + chordTip);
    ctx.lineTo(vcx - wingSpan, cy - chordRoot*0.1 + sweepBack);
    ctx.closePath();
    ctx.stroke();

    const motorY = cy - chordRoot*0.1 + sweepBack + chordTip/2;
    drawMotor(vcx - wingSpan + 2, motorY, rgba(port), 5);
    drawMotor(vcx + wingSpan - 2, motorY, rgba(starboard), 5);

    ctx.strokeStyle = 'rgba(160,160,170,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(vcx - wingSpan - 4, motorY); ctx.lineTo(vcx - wingSpan + 8, motorY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(vcx + wingSpan + 4, motorY); ctx.lineTo(vcx + wingSpan - 8, motorY); ctx.stroke();

    ctx.fillStyle = 'rgba(200,200,210,0.7)';
    ctx.beginPath();
    ctx.moveTo(vcx, noseFront - 6);
    ctx.lineTo(vcx - 3, noseFront);
    ctx.lineTo(vcx + 3, noseFront);
    ctx.closePath();
    ctx.fill();
  }

  drawVTOL(row1ModernY, 'arm_port', 'arm_starboard');
  drawVTOL(row1ClassicY, 'arm_classic_side', 'arm_classic_side');

  // -- ROV (underwater vehicle, top-down view) --
  const rcx = row2SectionW * 0.5;

  function drawROV(cy, front, back, port, starboard) {
    const bodyW = 52, bodyH = 36, cr = 6;

    // Main dark body (rounded rectangle)
    ctx.fillStyle = 'rgba(30,30,40,0.95)';
    roundRect(rcx - bodyW/2, cy - bodyH/2, bodyW, bodyH, cr);
    ctx.fill();

    // Front section overlay (top strip)
    ctx.fillStyle = rgba(front);
    ctx.globalAlpha = 0.45;
    roundRect(rcx - bodyW/2, cy - bodyH/2, bodyW, 10, cr);
    // clip to top portion only
    ctx.fill();
    ctx.globalAlpha = 1.0;

    // Back section overlay (bottom strip)
    ctx.fillStyle = rgba(back);
    ctx.globalAlpha = 0.45;
    ctx.beginPath();
    ctx.moveTo(rcx - bodyW/2, cy + bodyH/2 - 10);
    ctx.lineTo(rcx + bodyW/2, cy + bodyH/2 - 10);
    ctx.lineTo(rcx + bodyW/2, cy + bodyH/2 - cr);
    ctx.arcTo(rcx + bodyW/2, cy + bodyH/2, rcx + bodyW/2 - cr, cy + bodyH/2, cr);
    ctx.lineTo(rcx - bodyW/2 + cr, cy + bodyH/2);
    ctx.arcTo(rcx - bodyW/2, cy + bodyH/2, rcx - bodyW/2, cy + bodyH/2 - cr, cr);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1.0;

    // Port (left) side strip
    ctx.fillStyle = rgba(port);
    ctx.globalAlpha = 0.45;
    ctx.fillRect(rcx - bodyW/2, cy - bodyH/2 + 10, 8, bodyH - 20);
    ctx.globalAlpha = 1.0;

    // Starboard (right) side strip
    ctx.fillStyle = rgba(starboard);
    ctx.globalAlpha = 0.45;
    ctx.fillRect(rcx + bodyW/2 - 8, cy - bodyH/2 + 10, 8, bodyH - 20);
    ctx.globalAlpha = 1.0;

    // Body outline
    ctx.strokeStyle = 'rgba(80,80,90,0.6)';
    ctx.lineWidth = 1;
    roundRect(rcx - bodyW/2, cy - bodyH/2, bodyW, bodyH, cr);
    ctx.stroke();

    // 4 thruster circles at corners
    const thrR = 6;
    const tOx = bodyW/2 + 4, tOy = bodyH/2 + 4;
    // Front-left thruster
    drawMotor(rcx - tOx + 6, cy - tOy + 6, rgba(front), thrR);
    // Front-right thruster
    drawMotor(rcx + tOx - 6, cy - tOy + 6, rgba(front), thrR);
    // Back-left thruster
    drawMotor(rcx - tOx + 6, cy + tOy - 6, rgba(back), thrR);
    // Back-right thruster
    drawMotor(rcx + tOx - 6, cy + tOy - 6, rgba(back), thrR);

    // Direction indicator (front triangle)
    ctx.fillStyle = rgba(front);
    ctx.beginPath();
    ctx.moveTo(rcx, cy - bodyH/2 - 6);
    ctx.lineTo(rcx - 4, cy - bodyH/2);
    ctx.lineTo(rcx + 4, cy - bodyH/2);
    ctx.closePath();
    ctx.fill();
  }

  drawROV(row2ModernY, 'arm_front', 'arm_back', 'arm_port', 'arm_starboard');
  drawROV(row2ClassicY, 'arm_classic_front', 'arm_classic_back', 'arm_classic_side', 'arm_classic_side');

  // -- Rover (ground vehicle, top-down view) --
  const rvcx = row2SectionW * 1.5;

  function drawRover(cy, front, back) {
    const bodyW = 34, bodyH = 50, cr = 4;

    // Dark chassis (rounded rectangle)
    ctx.fillStyle = 'rgba(30,30,40,0.95)';
    roundRect(rvcx - bodyW/2, cy - bodyH/2, bodyW, bodyH, cr);
    ctx.fill();

    // Front bumper section (top)
    ctx.fillStyle = rgba(front);
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.moveTo(rvcx - bodyW/2 + cr, cy - bodyH/2);
    ctx.lineTo(rvcx + bodyW/2 - cr, cy - bodyH/2);
    ctx.arcTo(rvcx + bodyW/2, cy - bodyH/2, rvcx + bodyW/2, cy - bodyH/2 + cr, cr);
    ctx.lineTo(rvcx + bodyW/2, cy - bodyH/2 + 12);
    ctx.lineTo(rvcx - bodyW/2, cy - bodyH/2 + 12);
    ctx.lineTo(rvcx - bodyW/2, cy - bodyH/2 + cr);
    ctx.arcTo(rvcx - bodyW/2, cy - bodyH/2, rvcx - bodyW/2 + cr, cy - bodyH/2, cr);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1.0;

    // Rear section (bottom)
    ctx.fillStyle = rgba(back);
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.moveTo(rvcx - bodyW/2, cy + bodyH/2 - 12);
    ctx.lineTo(rvcx + bodyW/2, cy + bodyH/2 - 12);
    ctx.lineTo(rvcx + bodyW/2, cy + bodyH/2 - cr);
    ctx.arcTo(rvcx + bodyW/2, cy + bodyH/2, rvcx + bodyW/2 - cr, cy + bodyH/2, cr);
    ctx.lineTo(rvcx - bodyW/2 + cr, cy + bodyH/2);
    ctx.arcTo(rvcx - bodyW/2, cy + bodyH/2, rvcx - bodyW/2, cy + bodyH/2 - cr, cr);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1.0;

    // Chassis outline
    ctx.strokeStyle = 'rgba(80,80,90,0.6)';
    ctx.lineWidth = 1;
    roundRect(rvcx - bodyW/2, cy - bodyH/2, bodyW, bodyH, cr);
    ctx.stroke();

    // 4 wheels at corners (dark with silver outline)
    const wheelW = 8, wheelH = 14, wheelOx = bodyW/2 + 3;
    const wheelOy = bodyH/2 - 10;

    function drawWheel(wx, wy) {
      // Tire (dark)
      ctx.fillStyle = 'rgba(20,20,25,0.95)';
      roundRect(wx - wheelW/2, wy - wheelH/2, wheelW, wheelH, 2);
      ctx.fill();
      // Hub (silver)
      ctx.strokeStyle = 'rgba(160,165,175,0.7)';
      ctx.lineWidth = 1.5;
      roundRect(wx - wheelW/2, wy - wheelH/2, wheelW, wheelH, 2);
      ctx.stroke();
      // Hub center dot
      ctx.fillStyle = 'rgba(140,145,155,0.6)';
      ctx.beginPath(); ctx.arc(wx, wy, 2, 0, Math.PI*2); ctx.fill();
    }

    // Front-left wheel
    drawWheel(rvcx - wheelOx, cy - wheelOy);
    // Front-right wheel
    drawWheel(rvcx + wheelOx, cy - wheelOy);
    // Rear-left wheel
    drawWheel(rvcx - wheelOx, cy + wheelOy);
    // Rear-right wheel
    drawWheel(rvcx + wheelOx, cy + wheelOy);

    // Suspension lines (connecting wheels to body)
    ctx.strokeStyle = 'rgba(60,60,70,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(rvcx - bodyW/2, cy - wheelOy); ctx.lineTo(rvcx - wheelOx + wheelW/2, cy - wheelOy);
    ctx.moveTo(rvcx + bodyW/2, cy - wheelOy); ctx.lineTo(rvcx + wheelOx - wheelW/2, cy - wheelOy);
    ctx.moveTo(rvcx - bodyW/2, cy + wheelOy); ctx.lineTo(rvcx - wheelOx + wheelW/2, cy + wheelOy);
    ctx.moveTo(rvcx + bodyW/2, cy + wheelOy); ctx.lineTo(rvcx + wheelOx - wheelW/2, cy + wheelOy);
    ctx.stroke();

    // Direction indicator (front triangle)
    ctx.fillStyle = rgba(front);
    ctx.beginPath();
    ctx.moveTo(rvcx, cy - bodyH/2 - 6);
    ctx.lineTo(rvcx - 4, cy - bodyH/2);
    ctx.lineTo(rvcx + 4, cy - bodyH/2);
    ctx.closePath();
    ctx.fill();
  }

  drawRover(row2ModernY, 'arm_front', 'arm_back');
  drawRover(row2ClassicY, 'arm_classic_front', 'arm_classic_back');
}

// -- Drone ID Palette Preview --
function drawPalette() {
  const ctx = getCtx('cvPalette');
  const W = CANVAS_SIZES.cvPalette[0], H = CANVAS_SIZES.cvPalette[1];
  ctx.clearRect(0, 0, W, H);

  const cols = 8;
  const rows = 2;
  const r = 10;
  const hPad = 24;
  const spacingX = (W - hPad * 2) / cols;
  const rowH = 34;
  const startY = 14;

  ctx.font = '8px SF Mono, Menlo, Consolas, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  for (let i = 0; i < 16; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const cx = hPad + spacingX * col + spacingX / 2;
    const cy = startY + row * rowH + r;

    ctx.fillStyle = rgba('drone_palette_' + i);
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#64748b';
    ctx.fillText(i.toString(), cx, cy + r + 2);
  }
}

// -- Prompt Preview --
function drawPrompt() {
  const ctx = getCtx('cvPrompt');
  const W = CANVAS_SIZES.cvPrompt[0], H = CANVAS_SIZES.cvPrompt[1];
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = rgba('prompt_scrim');
  ctx.fillRect(0, 0, W, H);

  const bx = 30, by = 20, bw = W-60, bh = H-40, br = 8;
  ctx.fillStyle = rgba('prompt_box_bg');
  ctx.beginPath();
  ctx.moveTo(bx+br, by);
  ctx.lineTo(bx+bw-br, by); ctx.arcTo(bx+bw, by, bx+bw, by+br, br);
  ctx.lineTo(bx+bw, by+bh-br); ctx.arcTo(bx+bw, by+bh, bx+bw-br, by+bh, br);
  ctx.lineTo(bx+br, by+bh); ctx.arcTo(bx, by+bh, bx, by+bh-br, br);
  ctx.lineTo(bx, by+br); ctx.arcTo(bx, by, bx+br, by, br);
  ctx.fill();

  ctx.strokeStyle = rgba('prompt_border');
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(bx+br, by);
  ctx.lineTo(bx+bw-br, by); ctx.arcTo(bx+bw, by, bx+bw, by+br, br);
  ctx.lineTo(bx+bw, by+bh-br); ctx.arcTo(bx+bw, by+bh, bx+bw-br, by+bh, br);
  ctx.lineTo(bx+br, by+bh); ctx.arcTo(bx, by+bh, bx, by+bh-br, br);
  ctx.lineTo(bx, by+br); ctx.arcTo(bx, by, bx+br, by, br);
  ctx.stroke();

  ctx.font = 'bold 14px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillStyle = rgba('prompt_title');
  ctx.textBaseline = 'top';
  ctx.fillText('POSITION CONFLICT', bx+16, by+14);

  ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillStyle = rgba('prompt_subtitle');
  ctx.fillText('5 drones overlap', bx+16, by+36);

  const opts = [['1','Cancel'],['2','Ghost'],['3','Grid offset']];
  ctx.textBaseline = 'middle';
  opts.forEach(([num, text], i) => {
    const oy = by + 64 + i * 24;
    ctx.font = 'bold 13px SF Mono, Menlo, Consolas, monospace';
    ctx.fillStyle = rgba('prompt_key');
    ctx.fillText(num, bx+20, oy);
    ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillStyle = rgba('prompt_text');
    ctx.fillText(text, bx+40, oy);
  });

  ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.fillStyle = rgba('prompt_hint');
  ctx.fillText('Press 1, 2, or 3', bx+16, by+bh-14);
}

// -- Debug Panel Preview --
function drawDebug() {
  const ctx = getCtx('cvDebug');
  const W = CANVAS_SIZES.cvDebug[0], H = CANVAS_SIZES.cvDebug[1];
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = rgba('dbg_bg');
  ctx.fillRect(0, 0, W, H);

  let y = 16;
  ctx.font = 'bold 12px SF Mono, Menlo, Consolas, monospace';
  ctx.fillStyle = rgba('dbg_accent');
  ctx.textBaseline = 'top';
  ctx.fillText('FPS', 12, y);
  ctx.fillStyle = rgba('dbg_tier1');
  ctx.fillText('60', 50, y);

  y += 24;
  const gx = 12, gy = y, gw = W-24, gh = 60;
  ctx.fillStyle = rgba('dbg_graph_bg');
  ctx.fillRect(gx, gy, gw, gh);
  ctx.strokeStyle = rgba('dbg_graph_grid');
  ctx.lineWidth = 0.5;
  for (let i = 1; i < 4; i++) {
    const ly = gy + gh * i / 4;
    ctx.beginPath(); ctx.moveTo(gx, ly); ctx.lineTo(gx+gw, ly); ctx.stroke();
  }
  ctx.strokeStyle = rgba('dbg_tier1');
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let x = 0; x < gw; x++) {
    const val = Math.sin(x*0.1)*0.3 + 0.5 + Math.sin(x*0.03)*0.15;
    const py = gy + gh - val * gh;
    if (x === 0) ctx.moveTo(gx+x, py); else ctx.lineTo(gx+x, py);
  }
  ctx.stroke();

  y = gy + gh + 16;
  ctx.font = '12px SF Mono, Menlo, Consolas, monospace';
  ctx.fillStyle = rgba('dbg_text');
  ctx.fillText('Tier', 12, y);
  ctx.fillStyle = rgba('dbg_tier1');
  ctx.fillText('T1', 50, y);
  ctx.fillStyle = rgba('dbg_tier2');
  ctx.fillText('T2', 80, y);
  ctx.fillStyle = rgba('dbg_tier3');
  ctx.fillText('T3', 110, y);

  y += 22;
  ctx.fillStyle = rgba('dbg_text');
  ctx.fillText('X +12.3', 12, y);

  y += 18;
  ctx.fillStyle = rgba('dbg_dim');
  ctx.fillText('dim text sample', 12, y);
}

// -- Ground Track Preview --
function drawGround() {
  const ctx = getCtx('cvGround');
  const W = CANVAS_SIZES.cvGround[0], H = CANVAS_SIZES.cvGround[1];
  ctx.clearRect(0, 0, W, H);

  const cx = W/2;
  const discR = 36;
  const discCY = H - 50;
  const dropLineTop = 30;
  const crossLen = discR * 0.5;

  // Dashed vertical drop line from drone to disc
  ctx.strokeStyle = rgba('ground_track_shadow');
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(cx, dropLineTop);
  ctx.lineTo(cx, discCY - discR - 4);
  ctx.stroke();
  ctx.setLineDash([]);

  // Small drone icon at top of drop line
  ctx.fillStyle = rgba('ground_track_edge');
  ctx.beginPath();
  ctx.moveTo(cx, dropLineTop - 6);
  ctx.lineTo(cx - 5, dropLineTop + 2);
  ctx.lineTo(cx + 5, dropLineTop + 2);
  ctx.closePath();
  ctx.fill();
  // Wing line
  ctx.strokeStyle = rgba('ground_track_edge');
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - 10, dropLineTop);
  ctx.lineTo(cx + 10, dropLineTop);
  ctx.stroke();

  // Filled disc
  ctx.fillStyle = rgba('ground_track_fill');
  ctx.beginPath(); ctx.arc(cx, discCY, discR, 0, Math.PI*2); ctx.fill();

  // Edge circle outline
  ctx.strokeStyle = rgba('ground_track_edge');
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, discCY, discR, 0, Math.PI*2); ctx.stroke();

  // Simple cross through center (two perpendicular lines)
  ctx.strokeStyle = rgba('ground_track_edge');
  ctx.lineWidth = 1.5;
  // Horizontal
  ctx.beginPath();
  ctx.moveTo(cx - crossLen, discCY);
  ctx.lineTo(cx + crossLen, discCY);
  ctx.stroke();
  // Vertical
  ctx.beginPath();
  ctx.moveTo(cx, discCY - crossLen);
  ctx.lineTo(cx, discCY + crossLen);
  ctx.stroke();
}

// -- Ortho Grid Preview --
function drawOrtho() {
  const ctx = getCtx('cvOrtho');
  const W = CANVAS_SIZES.cvOrtho[0], H = CANVAS_SIZES.cvOrtho[1];

  ctx.fillStyle = rgba('ground');
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = rgba('ortho_grid_minor');
  ctx.lineWidth = 1;
  const step = 20;
  for (let x = step; x < W; x += step) {
    const px = Math.round(x) + 0.5;
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();
  }
  for (let y = step; y < H; y += step) {
    const py = Math.round(y) + 0.5;
    ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke();
  }

  ctx.strokeStyle = rgba('ortho_grid_major');
  ctx.lineWidth = 1;
  const majorStep = step * 5;
  for (let x = majorStep; x < W; x += majorStep) {
    const px = Math.round(x) + 0.5;
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();
  }
  for (let y = majorStep; y < H; y += majorStep) {
    const py = Math.round(y) + 0.5;
    ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke();
  }
}

// -- Draw all previews --
function drawAll() {
  drawScene();
  drawHud();
  drawTrail();
  drawRibbon();
  drawArms();
  drawPalette();
  drawPrompt();
  drawDebug();
  drawGround();
  drawOrtho();
}

// -- Init --
buildSidebar();
loadPreset('Grid');
syncUI();
drawAll();
</script>
